<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <title>FeatherBase</title>
    <meta
      name="description"
      content="A Pokédex-style database of Indian bird species"
    />

    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="apple-touch-icon" href="/logo.svg" />

    <meta
      name="theme-color"
      content="#02241d"
      media="(prefers-color-scheme: light)"
    />
    <meta
      name="theme-color"
      content="#0d1512"
      media="(prefers-color-scheme: dark)"
    />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta
      name="apple-mobile-web-app-status-bar-style"
      content="black-translucent"
    />
    <meta name="apple-mobile-web-app-title" content="FeatherBase" />
  </head>
  <body class="font-sans">
    <div id="app"></div>
    <noscript>
      <div>Please enable JavaScript to use this application.</div>
    </noscript>
    <script>
      ;(function () {
        var prefersDark =
          window.matchMedia &&
          window.matchMedia('(prefers-color-scheme: dark)').matches
        var theme = 'auto'
        try {
          var raw = localStorage.getItem('featherbase-settings')
          if (raw) theme = JSON.parse(raw).theme || 'auto'
        } catch (e) {}
        if (theme === 'dark' || (theme === 'auto' && prefersDark))
          document.documentElement.classList.add('dark')
      })()
    </script>
    <script type="module" src="/src/main.ts"></script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', function () {
          navigator.serviceWorker.register('/sw.js')
        })
      }
    </script>
  </body>
</html>

[build]
  command = "pnpm build:FE"
  publish = "web/dist"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "20"

[functions]
  included_files = ["package.json"]

[[redirects]]
  from = "/v1.0/*"
  to = "/.netlify/functions/api/v1.0/:splat"
  status = 200

[[redirects]]
  from = "/_health"
  to = "/.netlify/functions/api/_health"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
